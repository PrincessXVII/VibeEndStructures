name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Get version
        id: version
        run: echo "version=$(grep '^version = ' build.gradle | sed "s/version = '\\(.*\\)'/\\1/")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeEndStructures-${{ steps.version.outputs.version }}
          path: build/libs/VibeEndStructures-${{ steps.version.outputs.version }}.jar

      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: build/libs/VibeEndStructures-${{ steps.version.outputs.version }}.jar
          generate_release_notes: false
